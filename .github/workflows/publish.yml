name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.2.3, etc.

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/rcv-engine/package-lock.json

      - name: Install dependencies
        working-directory: packages/rcv-engine
        run: npm ci

      - name: Typecheck
        working-directory: packages/rcv-engine
        run: npm run typecheck

      - name: Test
        working-directory: packages/rcv-engine
        run: npm test

      - name: Build
        working-directory: packages/rcv-engine
        run: npm run build

      - name: Verify tag matches package version
        working-directory: packages/rcv-engine
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version $PKG_VERSION confirmed."

      - name: Publish
        working-directory: packages/rcv-engine
        run: npm publish --provenance --access public
