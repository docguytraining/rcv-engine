name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/rcv-engine/package-lock.json

      - name: Install dependencies
        working-directory: packages/rcv-engine
        run: npm ci

      - name: Typecheck
        working-directory: packages/rcv-engine
        run: npm run typecheck

      - name: Test
        working-directory: packages/rcv-engine
        run: npm test
